<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Governance Blockchain Demo</title>
    <style>
        body { font-family: monospace; background: #fdfdfd; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .node { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .node h2 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 5px;}
        .chain { background: #1e1e1e; color: #00ff00; padding: 10px; height: 300px; overflow-y: auto; border-radius: 4px; font-size: 12px; white-space: pre-wrap; word-wrap: break-word; }
        .actions { margin-top: 15px; padding-top: 15px; border-top: 1px dotted #ccc; }
        input, button { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #0066cc; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0052a3; }
        .mine-btn { background: #28a745; }
        .mine-btn:hover { background: #218838; }
        .refresh-btn { background: #6c757d; }
        .refresh-btn:hover { background: #5a6268; }
        .sync-btn { background: #ffc107; color: black; }
        .header { text-align: center; margin-bottom: 30px; }
        
        /* Modal for adding transaction */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 300px; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Student Governance Local Blockchain (3 Nodes)</h1>
        <p>This dashboard interacts with the local 3-node Python blockchain simulating our voting network.</p>
        <button onclick="refreshAll()" class="refresh-btn" style="width: 200px;">Refresh All Nodes</button>
    </div>

    <div class="grid">
        <!-- Node 5000 -->
        <div class="node" id="node-5000">
            <h2>Node 1 (Port 5000)</h2>
            <div class="chain" id="chain-5000">Loading chain...</div>
            <div class="actions">
                <button onclick="openTxModal(5000)">+ Add Vote Transaction</button>
                <button onclick="mineBlock(5000)" class="mine-btn">⚒️ Mine Block</button>
                <button onclick="syncNode(5000)" class="sync-btn">🔄 Resolve/Sync Chain</button>
            </div>
        </div>

        <!-- Node 5001 -->
        <div class="node" id="node-5001">
            <h2>Node 2 (Port 5001)</h2>
            <div class="chain" id="chain-5001">Loading chain...</div>
            <div class="actions">
                <button onclick="openTxModal(5001)">+ Add Vote Transaction</button>
                <button onclick="mineBlock(5001)" class="mine-btn">⚒️ Mine Block</button>
                <button onclick="syncNode(5001)" class="sync-btn">🔄 Resolve/Sync Chain</button>
            </div>
        </div>

        <!-- Node 5002 -->
        <div class="node" id="node-5002">
            <h2>Node 3 (Port 5002)</h2>
            <div class="chain" id="chain-5002">Loading chain...</div>
            <div class="actions">
                <button onclick="openTxModal(5002)">+ Add Vote Transaction</button>
                <button onclick="mineBlock(5002)" class="mine-btn">⚒️ Mine Block</button>
                <button onclick="syncNode(5002)" class="sync-btn">🔄 Resolve/Sync Chain</button>
            </div>
        </div>
    </div>

    <!-- Transaction Modal -->
    <div class="modal" id="txModal">
        <div class="modal-content">
            <h3>Add Vote Transaction</h3>
            <p id="modal-target-node"></p>
            <input type="text" id="voter_id" placeholder="Voter ID (e.g., student_123)">
            <input type="text" id="candidate_id" placeholder="Candidate ID (e.g., Alice)">
            <button onclick="submitTransaction()">Submit Vote</button>
            <button onclick="closeTxModal()" style="background: #dc3545;">Cancel</button>
        </div>
    </div>

    <script>
        let currentNodePort = 5000;

        async function fetchChain(port) {
            try {
                const response = await fetch(`http://127.0.0.1:${port}/chain`);
                const data = await response.json();
                document.getElementById(`chain-${port}`).innerText = JSON.stringify(data.chain, null, 2);
            } catch (error) {
                document.getElementById(`chain-${port}`).innerText = 'Error connecting to node.';
            }
        }

        function refreshAll() {
            fetchChain(5000);
            fetchChain(5001);
            fetchChain(5002);
        }

        function openTxModal(port) {
            currentNodePort = port;
            document.getElementById('modal-target-node').innerText = `Targetting Node Port: ${port}`;
            document.getElementById('txModal').classList.add('active');
        }

        function closeTxModal() {
            document.getElementById('txModal').classList.remove('active');
            document.getElementById('voter_id').value = '';
            document.getElementById('candidate_id').value = '';
        }

        async function submitTransaction() {
            const voter_id = document.getElementById('voter_id').value;
            const candidate_id = document.getElementById('candidate_id').value;
            
            if (!voter_id || !candidate_id) {
                alert("Please fill all fields!");
                return;
            }

            try {
                const response = await fetch(`http://127.0.0.1:${currentNodePort}/transactions/new`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ voter_id, candidate_id })
                });
                
                if(response.ok) {
                    alert(`Transaction submitted to node ${currentNodePort}! Don't forget to mine a block to confirm it.`);
                    closeTxModal();
                } else {
                    alert('Error submitting transaction');
                }
            } catch (err) {
                alert(`Error: ${err.message}`);
            }
        }

        async function mineBlock(port) {
            document.getElementById(`chain-${port}`).innerText = 'Mining...';
            try {
                const response = await fetch(`http://127.0.0.1:${port}/mine`, { method: 'GET' });
                const data = await response.json();
                alert(`Block ${data.index} Mined on port ${port}!`);
                
                // Refresh all chains as mining triggers a gossip consensus resolve attempt in our simple model
                setTimeout(refreshAll, 1000);
            } catch (err) {
                alert(`Error: ${err.message}`);
                fetchChain(port);
            }
        }

        async function syncNode(port) {
            try {
                const response = await fetch(`http://127.0.0.1:${port}/nodes/resolve`, { method: 'GET' });
                const data = await response.json();
                alert(data.message);
                fetchChain(port);
            } catch (err) {
                alert(`Error: ${err.message}`);
            }
        }

        // Initial load
        window.onload = refreshAll;
    </script>
</body>
</html>
