<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Governance | Portal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.2);
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.05) 0%, transparent 35%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin: 0 0 10px;
            background: linear-gradient(to bottom right, #fff, #9ca3af);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-hub {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .node-pill {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #374151;
        }

        .online .indicator {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.05);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-link {
            background: transparent;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-decoration: underline;
            padding: 0;
            margin-top: 10px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            font-size: 0.8rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-dim);
            cursor: pointer;
            text-align: center;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .hidden {
            display: none;
        }

        /* Ledger */
        .feed {
            height: 480px;
            overflow-y: auto;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
        }

        .feed-item {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .voter-tag {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .cand-pill {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 12px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.75rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        #user-info {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Notifications */
        #notification-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .notification {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 16px 24px;
            border-radius: 16px;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            max-width: 400px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.8rem;
        }

        .notif-success .notification-icon {
            background: var(--success);
            color: var(--bg);
        }

        .notif-error .notification-icon {
            background: var(--danger);
            color: white;
        }

        .notif-info .notification-icon {
            background: var(--primary);
            color: white;
        }
    </style>
</head>

<body>

    <div id="notification-container"></div>

    <div class="container">
        <header>
            <h1>Student Voting Portal</h1>
            <div class="status-hub">
                <div class="node-pill" id="node-5000">
                    <div class="indicator"></div> Node 1
                </div>
                <div class="node-pill" id="node-5001">
                    <div class="indicator"></div> Node 2
                </div>
                <div class="node-pill" id="node-5002">
                    <div class="indicator"></div> Node 3
                </div>
            </div>
        </header>

        <div class="layout">
            <!-- Side: Auth & Vote -->
            <aside>
                <!-- Auth Card -->
                <div class="card" id="auth-card">
                    <div class="tabs">
                        <div class="tab active" id="tab-login" onclick="switchAuth('login')">Login</div>
                        <div class="tab" id="tab-register" onclick="switchAuth('register')">Register</div>
                    </div>

                    <div id="auth-form">
                        <input type="text" id="username" placeholder="Roll Number (e.g. BTC-01)">
                        <input type="password" id="password" placeholder="Password">
                        <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Login to Vote</button>
                    </div>
                </div>

                <!-- Vote Card (Hidden until login) -->
                <div class="card hidden" id="vote-card">
                    <div id="user-info">
                        <span id="display-user">User: BTC-01</span>
                        <button onclick="logout()"
                            style="width: auto; padding: 0; background: none; color: var(--danger); text-decoration: underline; font-size: 0.75rem;">Logout</button>
                    </div>

                    <div class="section-label">Cast Your Vote</div>
                    <select id="candidate-select"
                        style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; margin-bottom: 20px; outline: none;">
                        <option value="cand_1">Abc (President)</option>
                        <option value="cand_2">Xyz (President)</option>
                    </select>

                    <button class="btn-primary" onclick="submitVote()">Submit Encrypted Vote</button>
                    <button class="btn-link" style="color: var(--success);" onclick="mineBlock()">⚒️ Solidify Blockchain
                        (Mine)</button>
                </div>

                <p style="text-align: center; color: var(--text-dim); font-size: 0.7rem; margin-top: 20px;">
                    This portal integrates MongoDB Atlas (Identity) <br> with our Private Blockchain Ledger.
                </p>
            </aside>

            <!-- Main: Ledger -->
            <main class="card">
                <div class="section-label">
                    Live Verified Ledger
                    <span id="ledger-count">0 VOTES</span>
                </div>
                <div class="feed" id="ledger-feed">
                    <div
                        style="height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 0.8rem;">
                        No verified votes across the network yet.
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        const NODE_1 = "http://127.0.0.1:5000";
        let authMode = 'login';
        let accessToken = localStorage.getItem('access_token');
        let currentUserId = localStorage.getItem('user_id');

        function switchAuth(mode) {
            authMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('auth-btn').innerText = mode === 'login' ? 'Login' : 'Create Account';
        }

        function showNotification(message, type = 'info') {
            const container = document.getElementById('notification-container');
            const notif = document.createElement('div');
            notif.className = `notification notif-${type}`;

            const icon = type === 'success' ? '✓' : type === 'error' ? '!' : 'i';

            notif.innerHTML = `
                <div class="notification-icon">${icon}</div>
                <div class="notification-text">${message}</div>
            `;

            container.appendChild(notif);

            // Show with slight delay for transition
            setTimeout(() => notif.classList.add('show'), 10);

            // Remove after 4 seconds
            setTimeout(() => {
                notif.classList.remove('show');
                setTimeout(() => notif.remove(), 400);
            }, 4000);
        }

        async function handleAuth() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) return showNotification("Please fill all fields.", "error");

            const endpoint = authMode === 'login' ? "/login" : "/register";

            try {
                let body;
                let headers = { 'Content-Type': 'application/json' };

                if (authMode === 'login') {
                    const formData = new URLSearchParams();
                    formData.append('username', username);
                    formData.append('password', password);
                    body = formData;
                    headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
                } else {
                    body = JSON.stringify({ roll_number: username, password: password });
                }

                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: headers,
                    body: body
                });

                const data = await res.json();

                if (res.ok) {
                    if (authMode === 'register') {
                        showNotification("Account created! You can now login.", "success");
                        switchAuth('login');
                    } else {
                        accessToken = data.access_token;
                        currentUserId = username;
                        localStorage.setItem('access_token', accessToken);
                        localStorage.setItem('user_id', username);
                        showNotification(`Welcome back, ${username}!`, "success");
                        updateUI();
                    }
                } else {
                    showNotification(data.detail || "Authentication failed", "error");
                }
            } catch (e) {
                showNotification("Connection refused. Ensure backend is running.", "error");
            }
        }

        function updateUI() {
            if (accessToken) {
                document.getElementById('auth-card').classList.add('hidden');
                document.getElementById('vote-card').classList.remove('hidden');
                document.getElementById('display-user').innerText = `User: ${currentUserId}`;
            } else {
                document.getElementById('auth-card').classList.remove('hidden');
                document.getElementById('vote-card').classList.add('hidden');
            }
        }

        function logout() {
            localStorage.clear();
            accessToken = null;
            showNotification("Logged out successfully.", "info");
            updateUI();
        }

        async function submitVote() {
            const candidate = document.getElementById('candidate-select').value;

            try {
                const res = await fetch(`${API_BASE}/vote`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify({ candidate_id: candidate })
                });

                const data = await res.json();
                if (res.ok) {
                    showNotification("✅ Vote successfully cast! Mining required for verification.", "success");
                    refreshLedger();
                } else {
                    showNotification(`❌ ${data.detail}`, "error");
                }
            } catch (e) {
                showNotification("Error casting vote.", "error");
            }
        }

        async function mineBlock() {
            try {
                const res = await fetch(`${NODE_1}/mine`);
                if (res.ok) {
                    showNotification("💎 Block Solidified! Ledger updated.", "success");
                    refreshLedger();
                }
            } catch (e) { showNotification("Mining failed", "error"); }
        }

        async function refreshLedger() {
            try {
                const res = await fetch(`${API_BASE}/results`);
                const data = await res.json();

                // Fetch full chain as well to show specific transactions
                const chainRes = await fetch(`${NODE_1}/chain`);
                const chainData = await chainRes.json();

                const feed = document.getElementById('ledger-feed');
                let foundVotes = [];

                chainData.chain.forEach(block => {
                    if (block.transactions) {
                        block.transactions.forEach(tx => foundVotes.unshift(tx));
                    }
                });

                if (foundVotes.length > 0) {
                    feed.innerHTML = foundVotes.map(tx => `
                        <div class="feed-item">
                            <div class="voter-id"><span>VERIFIED:</span>${tx.voter_id}</div>
                            <div class="cand-pill">${tx.candidate_id}</div>
                        </div>
                    `).join('');
                    document.getElementById('ledger-count').innerText = `${foundVotes.length} VOTES`;
                }
            } catch (e) { console.warn("Syncing..."); }
        }

        async function checkNodes() {
            [5000, 5001, 5002].forEach(async port => {
                const el = document.getElementById(`node-${port}`);
                try {
                    const res = await fetch(`http://127.0.0.1:${port}/`);
                    el.classList.toggle('online', res.ok);
                } catch { el.classList.remove('online'); }
            });
        }

        window.onload = () => {
            updateUI();
            refreshLedger();
            setInterval(checkNodes, 5000);
            setInterval(refreshLedger, 10000);
        };
    </script>
</body>

</html>
