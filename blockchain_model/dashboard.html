<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Governance | Node Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(148, 163, 184, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .node-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .node-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .node-status {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .node-card h2 {
            font-size: 1.25rem;
            margin: 0 0 20px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .node-card h2 span {
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .chain-view {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            height: 350px;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.6;
            color: #10b981;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .chain-view::-webkit-scrollbar {
            width: 6px;
        }

        .chain-view::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .actions {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .btn-warning {
            background: var(--warning);
            color: #000;
        }

        .btn-warning:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .btn-outline:hover {
            border-color: var(--text-main);
            color: var(--text-main);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-content h3 {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .refresh-all-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 30px;
            border-radius: 50px;
            margin: 0 auto;
            display: flex;
            width: fit-content;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>Blockchain Dashboard</h1>
            <p>Real-time visualization of the decentralized student governance network.</p>
            <button onclick="refreshAll()" class="refresh-all-btn">
                <span>🔄</span> Refresh All Nodes
            </button>
        </div>

        <div class="grid">
            <!-- Node Template -->
            <script>
                const nodes = [5000, 5001, 5002];
                nodes.forEach(port => {
                    document.write(`
                        <div class="node-card" id="node-${port}">
                            <div class="node-status" id="status-${port}"></div>
                            <h2>Node ${nodes.indexOf(port) + 1} <span>: ${port}</span></h2>
                            <div class="chain-view" id="chain-${port}">Connecting...</div>
                            <div class="actions">
                                <button onclick="openTxModal(${port})" class="btn-primary">
                                    <span>➕</span> Add Vote
                                </button>
                                <button onclick="mineBlock(${port})" class="btn-success">
                                    <span>⚒️</span> Mine Block
                                </button>
                                <button onclick="syncNode(${port})" class="btn-warning">
                                    <span>🔄</span> Sync Chain
                                </button>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
    </div>

    <!-- Transaction Modal -->
    <div class="modal" id="txModal">
        <div class="modal-content">
            <h3>Submit New Vote</h3>
            <p id="modal-target-node" style="color: var(--text-dim); margin-bottom: 20px; font-size: 0.9rem;"></p>
            <input type="text" id="voter_id" placeholder="Voter ID (e.g., student_123)">
            <input type="text" id="candidate_id" placeholder="Candidate ID (e.g., cand_1)">
            <button onclick="submitTransaction()" class="btn-primary" style="width: 100%;">Broadcast Vote</button>
            <button onclick="closeTxModal()" class="btn-outline" style="width: 100%; margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <script>
        let currentNodePort = 5000;

        async function fetchChain(port) {
            const chainEl = document.getElementById(`chain-${port}`);
            const statusEl = document.getElementById(`status-${port}`);
            try {
                const response = await fetch(`http://127.0.0.1:${port}/chain`);
                const data = await response.json();
                chainEl.innerText = JSON.stringify(data.chain, null, 2);
                statusEl.style.background = 'var(--success)';
                statusEl.style.boxShadow = '0 0 10px var(--success)';
            } catch (error) {
                chainEl.innerText = 'Node Offline';
                chainEl.style.color = 'var(--danger)';
                statusEl.style.background = 'var(--danger)';
                statusEl.style.boxShadow = '0 0 10px var(--danger)';
            }
        }

        function refreshAll() {
            nodes.forEach(port => fetchChain(port));
        }

        function openTxModal(port) {
            currentNodePort = port;
            document.getElementById('modal-target-node').innerText = `Targetting Global Node Port: ${port}`;
            document.getElementById('txModal').classList.add('active');
        }

        function closeTxModal() {
            document.getElementById('txModal').classList.remove('active');
            document.getElementById('voter_id').value = '';
            document.getElementById('candidate_id').value = '';
        }

        async function submitTransaction() {
            const voter_id = document.getElementById('voter_id').value;
            const candidate_id = document.getElementById('candidate_id').value;

            if (!voter_id || !candidate_id) {
                alert("Please fill all fields!");
                return;
            }

            try {
                const response = await fetch(`http://127.0.0.1:${currentNodePort}/transactions/new`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ voter_id, candidate_id })
                });

                if (response.ok) {
                    alert(`Vote broadcast to node ${currentNodePort}! Mining required for confirmation.`);
                    closeTxModal();
                    fetchChain(currentNodePort);
                } else {
                    const err = await response.json();
                    alert(`Error: ${err.detail || 'Failed to submit'}`);
                }
            } catch (err) {
                alert(`Network Error: ${err.message}`);
            }
        }

        async function mineBlock(port) {
            const chainEl = document.getElementById(`chain-${port}`);
            chainEl.innerText = '// Mining block... Finding proof...';
            try {
                const response = await fetch(`http://127.0.0.1:${port}/mine`, { method: 'GET' });
                const data = await response.json();
                alert(`Success! Block #${data.index} solidified on the chain.`);
                setTimeout(refreshAll, 500);
            } catch (err) {
                alert(`Mining failed: ${err.message}`);
                fetchChain(port);
            }
        }

        async function syncNode(port) {
            try {
                const response = await fetch(`http://127.0.0.1:${port}/nodes/resolve`, { method: 'GET' });
                const data = await response.json();
                alert(data.message);
                fetchChain(port);
            } catch (err) {
                alert(`Sync failed: ${err.message}`);
            }
        }

        // Initial load
        window.onload = refreshAll;
    </script>
</body>

</html>
